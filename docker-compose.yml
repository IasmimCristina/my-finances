services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: my_finances_development
    ports:
      - "5532:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  web:
    build: .
    command: ./bin/dev
    volumes:
      - .:/rails
    ports:
      - "3003:3000"
    depends_on:
      - db
      - redis
    environment:
      RAILS_ENV: development  
      DATABASE_HOST: db
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: my_finances_development
      REDIS_URL: redis://redis:6379/0

volumes:
  postgres_data:
  redis_data:
